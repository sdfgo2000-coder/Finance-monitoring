name: Generate Banner Images

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: claude/happy-noether-t5sj55

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install pillow

      - name: Generate images
        run: python scripts/gen_news_images.py

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/news/
          git commit -m "Generate news banner images" || echo "Nothing to commit"
          git push
